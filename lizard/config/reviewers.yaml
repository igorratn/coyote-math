# Reviewer pool config — used by CLI Job 2 Phase A.
#
# Two reviewers, two invocation paths. Pool is A ≠ B by construction.
#   - opus     : Claude Opus 4.7 via `claude -p` subprocess, cwd=sandbox.
#   - openclaw : HTTP POST to local openclaw shim (127.0.0.1:18789).
#                Model behind openclaw is deliberately opaque.
#
# Merger (cowork) never sees reviewer identity — outputs are labeled
# Review 1 / Review 2 only. CLI records the pairing in
# _manifest.state.json → tasks.<stem>.reviewers for audit.
#
# CLI fires both in parallel (bash & + wait). Per-reviewer timeout below.

reviewers:
  - id: opus
    kind: cli_subprocess
    # Runs in the sandbox dir. Prompt interpolated at launch time.
    # Sandbox composition in sandbox_root section below.
    command: ["claude", "-p", "${prompt}"]
    cwd: "${sandbox}"

  - id: openclaw
    kind: http_post
    endpoint: http://127.0.0.1:18789/chat
    session_pattern: "agent:r:${stem}-${uuid}"
    # Sandbox not enforceable over HTTP — openclaw receives the full prompt
    # (skeleton text + framework text inlined by CLI). Independence is by
    # session isolation + the fact that it never sees the other reviewer's output.

# Slot assignment (r1 vs r2) per task: random. Both entries always enabled.
# If one path fails (e.g. openclaw down), CLI marks task held.

# Per-reviewer timeout. On timeout CLI aborts the task, marks held.
timeout_seconds: 180

# Reviewer session sandbox — filesystem view rooted here during review.
# CLI builds the view as a symlink tree; Opus subprocess runs with cwd=view.
# (openclaw has no filesystem — CLI inlines files into the prompt.)
sandbox_root: /tmp/lizard

# Exposed paths in each reviewer's view (symlinks into repo):
#   skeleton.md   -> tasks/skeleton/<stem>.md
#   template.md   -> templates/review-template.md
#   framework.md  -> templates/review-prompt.md
#   wiki/         -> wiki/
#   CLAUDE.md     -> CLAUDE.md
# Output written to:
#   review.md     (in view dir; CLI copies to tasks/review{1,2}/<stem>.md after)
